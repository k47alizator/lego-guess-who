<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minifig Who - Online</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --lego-yellow: #FFD500;
            --lego-red: #E3000B;
            --lego-blue: #006CB7;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('img/tlo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #menu, #game-area { 
            padding: 40px 20px; 
            position: relative; 
            flex: 1;
        }

        h1.main-title {
            font-weight: 700;
            font-size: clamp(2.5rem, 8vw, 4rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--lego-yellow);
            text-shadow: 3px 3px 0px #B45309;
            margin-bottom: 5px;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        h1.main-title span { color: var(--lego-red); text-shadow: 3px 3px 0px #900; }

        .subtitle {
            font-size: 1rem; color: #9CA3AF; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- TWOJA POSTAĆ (OBRAZEK OBOK NAZWY) --- */
        .target-box {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 20px;
            border: 3px solid var(--lego-yellow);
            display: inline-block;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .target-content {
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }

        .target-img-box {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 213, 0, 0.3);
        }

        .target-img-box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .target-info p { margin: 0; color: #9CA3AF; font-size: 11px; text-transform: uppercase; }
        .target-info h2 { margin: 2px 0 0 0; color: var(--lego-yellow); font-size: 26px; font-weight: 700; }

        /* --- RESZTA STYLI --- */
        .start-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 800px; margin: 0 auto; }
        .brickle-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; }
        .brickle-card:hover { transform: translateY(-5px); border-color: var(--lego-yellow); }
        .icon-box { width: 65px; height: 65px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 20px; }
        .icon-yellow { background: var(--lego-yellow); color: #000; }
        .icon-red { background: var(--lego-red); color: #fff; }
        
        input { padding: 12px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); width: 80%; text-align: center; background: rgba(0,0,0,0.4); color: white; margin-top: 20px; }
        .action-btn, .exit-btn, .cat-btn { background: rgba(255, 255, 255, 0.07); color: white; cursor: pointer; border: 2px solid var(--lego-yellow); padding: 10px 20px; border-radius: 12px; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
        .action-btn:hover, .cat-btn:hover { background: var(--lego-red); border-color: var(--lego-red); transform: translateY(-3px); }

        .size-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .size-btn { background: rgba(255,255,255,0.1); border: 2px solid transparent; color: #9CA3AF; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .size-btn.active { border-color: var(--lego-red); color: white; background: rgba(227,0,11,0.2); }

        .character-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-width: 1200px; margin: 20px auto; }
        .card { background: white; border-radius: 15px; padding: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 3px solid transparent; text-align: center; }
        .card:hover { border-color: var(--lego-yellow); }
        .card.eliminated { opacity: 0.15; filter: grayscale(100%); transform: scale(0.92); }
        .card-img-container { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; background: #f3f4f6; border-radius: 10px; }
        .main-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card-name { color: #111; font-size: 11px; font-weight: 700; margin-top: 10px; text-transform: uppercase; }

        .discord-corner { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: #5865F2; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .discord-corner img { width: 60%; }
        .lego-footer { padding: 20px; font-size: 10px; color: rgba(156, 163, 175, 0.4); background: rgba(15, 23, 42, 0.5); }
    </style>
</head>
<body>

<div id="menu">
    <div class="discord-corner" onclick="window.open('https://discord.gg/FeBT9tVEsY')"><img src="img/Discord.png"></div>
    <h1 class="main-title" onclick="location.href=location.pathname">Minifig <span>Who</span></h1>
    <p class="subtitle">Zgadnij postać przeciwnika</p>
    
    <div id="setup-view">
        <div class="start-grid">
            <div class="brickle-card" onclick="createGame()">
                <div class="icon-box icon-yellow"><i class="fa-solid fa-plus"></i></div>
                <div class="card-title">Stwórz grę</div>
                <div class="card-desc">Załóż nowy pokój i zaproś znajomego.</div>
            </div>
            <div class="brickle-card" style="cursor: default;">
                <div class="icon-box icon-red"><i class="fa-solid fa-right-to-bracket"></i></div>
                <div class="card-title">Dołącz</div>
                <input type="text" id="room-input" placeholder="Wpisz kod">
                <button class="action-btn" style="margin-top: 15px; width: 80%;" onclick="joinGame()">WEJDŹ</button>
            </div>
        </div>
    </div>

    <div id="lobby-view" style="display: none;">
        <div style="background: var(--card-bg); padding: 15px 30px; border-radius: 15px; border: 2px solid var(--lego-red); display: inline-flex; align-items: center; gap: 20px;">
            <div style="text-align: left;">
                <p style="margin: 0; font-size: 10px; color: #9CA3AF;">KOD POKOJU:</p>
                <h2 id="display-code" style="margin: 0; font-size: 32px;">---</h2>
            </div>
            <img src="img/Share symbol.png" style="width:26px; cursor:pointer" onclick="copyRoomLink()">
        </div>
        <h3 style="margin-top: 30px; color: #9CA3AF; font-size: 14px;">LICZBA KART:</h3>
        <div class="size-selector">
            <button class="size-btn" onclick="setBoardSize(21, this)">21</button>
            <button class="size-btn active" onclick="setBoardSize(28, this)">28</button>
            <button class="size-btn" onclick="setBoardSize(35, this)">35</button>
        </div>
        <div id="category-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;"></div>
    </div>
</div>

<div id="game-area" style="display: none;">
    <div class="target-box">
        <div class="target-content">
            <div class="target-img-box">
                <img id="target-display-img" src="" alt="Twoja Postać">
            </div>
            <div class="target-info">
                <p>Twoja Postać:</p>
                <h2 id="target-name">---</h2>
            </div>
        </div>
    </div>
    
    <div style="margin-bottom: 20px;">
        <button onclick="backToLobby()" class="exit-btn">Powrót do kategorii</button>
    </div>
    <div id="character-grid" class="character-grid"></div>
</div>

<div class="lego-footer">
    <p>Projekt fanowski. LEGO® jest znakiem towarowym Grupy LEGO.</p>
</div>

let currentBoardSize = 28;
    const extensions = ['jpg', 'png', 'webp', 'jpeg'];

    const getFolderName = (cat) => cat.replace('LEGO ', '').toLowerCase().trim().replace(/\s+/g, '-');

    function setBoardSize(size, el) {
        currentBoardSize = size;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function createGame() {
        let code = Math.floor(1000 + Math.random() * 9000).toString();
        enterLobby(code);
    }

    function joinGame() {
        const code = document.getElementById('room-input').value.trim();
        if (code) enterLobby(code);
    }

    function enterLobby(code) {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('lobby-view').style.display = 'block';
        document.getElementById('display-code').innerText = code;
        generateCategoryButtons();
    }

    function generateCategoryButtons() {
        const container = document.getElementById('category-buttons');
        container.innerHTML = '';
        Object.keys(db).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat.replace('LEGO ', '');
            btn.onclick = () => initGame(cat);
            container.appendChild(btn);
        });
    }

    function initGame(category) {
        const roomCode = document.getElementById('display-code').innerText;
        let pool = [];
        
        Object.keys(db).forEach(cat => {
            if (category === 'MIX' || cat === category) {
                const folder = getFolderName(cat);
                db[cat].forEach(char => pool.push({ ...char, folder: folder }));
            }
        });

        // Seedowane mieszanie (stałe dla danego kodu pokoju)
        let seed = 0;
        for (let i = 0; i < roomCode.length; i++) seed = ((seed << 5) - seed) + roomCode.charCodeAt(i);
        const rand = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };

        pool.sort(() => rand() - 0.5);
        const selected = pool.slice(0, currentBoardSize);
        const target = selected[Math.floor(Math.random() * selected.length)];

        // Ustawianie Twojej Postaci
        document.getElementById('target-name').innerText = target.n;
        const targetImg = document.getElementById('target-display-img');
        
        const getUrl = (name, folder, ext) => `https://raw.githubusercontent.com/${githubConfig.user}/${githubConfig.repo}/main/${githubConfig.folder}/${folder}/${encodeURIComponent(name)}.${ext}`;
        const bingFallback = (name) => `https://tse2.mm.bing.net/th?q=lego+${encodeURIComponent(name)}+minifigure&w=200`;

        let tExtIdx = 0;
        targetImg.src = getUrl(target.n, target.folder, extensions[0]);
        targetImg.onerror = function() {
            if (++tExtIdx < extensions.length) this.src = getUrl(target.n, target.folder, extensions[tExtIdx]);
            else this.src = bingFallback(target.n);
        };

        // Generowanie planszy
        const grid = document.getElementById('character-grid');
        grid.innerHTML = '';
        selected.forEach(char => {
            const card = document.createElement('div');
            card.className = 'card';
            let cExtIdx = 0;
            const cUrl = getUrl(char.n, char.folder, extensions[0]);

            card.innerHTML = `
                <div class="card-img-container">
                    <img class="main-img" src="${cUrl}">
                </div>
                <div class="card-name">${char.n}</div>
            `;

            const img = card.querySelector('.main-img');
            img.onerror = function() {
                if (++cExtIdx < extensions.length) this.src = getUrl(char.n, char.folder, extensions[cExtIdx]);
                else this.src = bingFallback(char.n);
            };

            card.onclick = () => card.classList.toggle('eliminated');
            grid.appendChild(card);
        });

        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function backToLobby() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('menu').style.display = 'block';
    }

    function copyRoomLink() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("Skopiowano link!"));
