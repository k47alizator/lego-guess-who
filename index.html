<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Guess Who - Online</title>
    <style>
        :root {
            --lego-yellow: #FFD500;
            --lego-red: #E3000B;
            --lego-blue: #006CB7;
            --bg-dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            text-align: center;
        }

        #menu, #game-area { padding: 20px; }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 20px auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .card:hover { transform: scale(1.03); }

        .card.eliminated {
            opacity: 0.15;
            filter: grayscale(100%) brightness(0.7);
            transform: scale(0.95);
        }

        .bing-badge {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(0, 108, 183, 0.8);
            color: white;
            border: none;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: bold;
            border-radius: 2px;
            z-index: 10;
            pointer-events: none;
            text-transform: uppercase;
        }

        .btn {
            background: var(--lego-red);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px #900;
        }

        .cat-btn {
            background: var(--lego-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.2s;
        }

        .cat-btn:hover { background: #0085e4; }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 2px solid var(--lego-yellow);
            width: 200px;
            text-align: center;
            background: #333;
            color: white;
        }

        .target-box {
            background: #333;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid var(--lego-yellow);
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: var(--lego-yellow); text-shadow: 2px 2px #000;">🧩 LEGO GUESS WHO</h1>
    
    <div id="setup-view">
        <button class="btn" onclick="createGame()">NOWY POKÓJ</button>
        <div style="margin: 25px 0;">
            <p style="color: #ccc;">WPISZ KOD OD ZNAJOMEGO:</p>
            <input type="text" id="room-input" placeholder="np. LEGO-123">
            <button class="btn" style="background: var(--lego-blue); box-shadow: 0 4px #004a7c;" onclick="joinGame()">DOŁĄCZ</button>
        </div>
    </div>

    <div id="lobby-view" style="display: none; margin-top: 20px;">
        <div style="background: #333; padding: 20px; border-radius: 15px; border: 2px solid #00ff00; display: inline-block;">
            <p style="margin: 0; color: #bbb;">KOD POKOJU:</p>
            <h2 id="display-code" style="margin: 10px 0; font-size: 40px; font-family: monospace; color: white;">---</h2>
            <button onclick="copyRoomLink()" style="font-size: 11px; background: #555; color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer;">Skopiuj Link</button>
        </div>
        <h3 style="margin: 25px 0;">Wybierz kategorię:</h3>
        <div id="category-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 900px; margin: 0 auto;"></div>
    </div>
</div>

<div id="game-area" style="display: none;">
    <div class="target-box">
        <p style="margin: 0; color: #aaa; font-size: 14px;">TWOJA POSTAĆ:</p>
        <h2 id="target-name" style="margin: 5px 0; color: var(--lego-yellow);">---</h2>
    </div>
    <div style="margin-bottom: 20px;">
        <button onclick="location.reload()" style="background: #555; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Wyjdź do Menu</button>
    </div>
    <div id="character-grid" class="character-grid"></div>
</div>

    // Automat zamieniający nazwę kategorii na nazwę folderu na GitHub (np. "LEGO STAR WARS" -> "star-wars")
    const getFolderName = (catName) => {
        return catName.replace('LEGO ', '')
                      .toLowerCase()
                      .trim()
                      .replace(/\s+\/\s+/g, '-') // Zamienia " / " na "-"
                      .replace(/\s+/g, '-');     // Zamienia spacje na "-"
    };

    function createGame() {
        const code = "LEGO-" + Math.floor(100 + Math.random() * 899);
        document.getElementById('room-input').value = code;
        enterLobby(code);
    }

    function joinGame() {
        const code = document.getElementById('room-input').value.trim();
        if (code.length < 1) return alert("Wpisz kod!");
        enterLobby(code);
    }

    function enterLobby(code) {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('lobby-view').style.display = 'block';
        document.getElementById('display-code').innerText = code.toUpperCase();
        generateCategoryButtons();
    }

    function generateCategoryButtons() {
        const container = document.getElementById('category-buttons');
        container.innerHTML = '';
        
        // Przycisk TRYB MIX
        const mixBtn = document.createElement('button');
        mixBtn.className = 'cat-btn';
        mixBtn.style.background = 'orange'; 
        mixBtn.style.color = 'black';
        mixBtn.innerText = '🔥 TRYB MIX';
        mixBtn.onclick = () => initGame('MIX');
        container.appendChild(mixBtn);

        // Przyciski kategorii z bazy danych
        Object.keys(db).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat.replace('LEGO ', '');
            btn.onclick = () => initGame(cat);
            container.appendChild(btn);
        });
    }

    // --- GŁÓWNA LOGIKA GRY ---

    function initGame(category) {
        const roomCode = document.getElementById('display-code').innerText;
        let pool = [];

        // PRZYPISANIE FOLDERÓW: Każda postać dostaje info o swoim podfolderze
        if (category === 'MIX') {
            Object.keys(db).forEach(cat => {
                const folder = getFolderName(cat);
                db[cat].forEach(char => {
                    pool.push({ ...char, folder: folder });
                });
            });
        } else {
            const folder = getFolderName(category);
            pool = db[category].map(char => ({ ...char, folder: folder }));
        }

        if (pool.length < 1) return alert("Ta kategoria jest pusta!");

        // 1. SEEDOWANIE (ten sam układ u obu graczy na podstawie kodu pokoju)
        let seed = 0;
        for (let i = 0; i < roomCode.length; i++) {
            seed = ((seed << 5) - seed) + roomCode.charCodeAt(i);
            seed |= 0;
        }

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const rand = mulberry32(seed);

        // 2. MIESZANIE FISHER-YATES
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(rand() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        // 3. WYBÓR 24 KART
        const selected = pool.slice(0, 24);

        // 4. LOSOWANIE TWOJEJ POSTACI (unikalna dla każdego gracza)
        const target = selected[Math.floor(Math.random() * selected.length)];
        document.getElementById('target-name').innerText = target.n;

        // 5. RENDEROWANIE PLANSZY
        const grid = document.getElementById('character-grid');
        grid.innerHTML = '';

        selected.forEach(char => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const extensions = ['jpg', 'png', 'webp', 'jpeg'];
            let currentExtIndex = 0;

            // DYNAMICZNY ADRES: uwzględnia podfolder przypisany do postaci
            const getGithubUrl = (ext) => `https://raw.githubusercontent.com/${githubConfig.user}/${githubConfig.repo}/main/${githubConfig.folder}/${char.folder}/${encodeURIComponent(char.n)}.${ext}`;
            
            const cleanName = char.n.replace(/\(.*\)/, '').trim();
            const urlInternet = `https://tse2.mm.bing.net/th?q=lego+${encodeURIComponent(cleanName)}+minifigure&w=200&h=300&c=7`;

            card.innerHTML = `
                <div style="position: relative; height: 140px; background: #e0e0e0; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                    <img class="main-img" src="${getGithubUrl(extensions[0])}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                    <button class="bing-badge" style="display:none;">🌐 INTERNET</button>
                </div>
                <p style="color:black; font-size:11px; font-weight:bold; margin-top:8px; pointer-events:none;">${char.n}</p>
            `;

            const imgTag = card.querySelector('.main-img');
            const bingBtn = card.querySelector('.bing-badge');

            // Logika sprawdzania formatów i przełączania na Bing
            imgTag.onerror = function() {
                if (currentExtIndex < extensions.length - 1) {
                    currentExtIndex++;
                    this.src = getGithubUrl(extensions[currentExtIndex]);
                } else if (this.src !== urlInternet) {
                    this.src = urlInternet;
                    bingBtn.style.display = "block";
                    card.classList.add('is-internet');
                }
            };

            card.onclick = function(e) {
                if (e.target.tagName === 'BUTTON') return;
                this.classList.toggle('eliminated');
            };

            grid.appendChild(card);
        });

        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function copyRoomLink() {
        const code = document.getElementById('display-code').innerText;
        const url = new URL(window.location.origin + window.location.pathname);
        url.searchParams.set('room', code);
        navigator.clipboard.writeText(url.toString()).then(() => alert("Skopiowano link do pokoju!"));
    }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        if (room) { 
            document.getElementById('room-input').value = room.toUpperCase(); 
            enterLobby(room); 
        }
    }
</script>
</body>
</html>
